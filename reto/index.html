  <style>

      min-height: 100vh;

      color: #f0ead8;

      overflow-x: hidden;
    }

      opacity:0.08; pointer-events:none; z-index:0;
    }
    body::before { width:520px; height:520px; background:#c9a84c; top:-180px; left:-200px; }
    body::after  { width:620px; height:620px; background:#c9a84c; bottom:-220px; right:-220px; }

        box-shadow:0 40px 100px rgba(0,0,0,0.5);
      }
      .topbar{ border-radius:24px 24px 0 0; }
      .screen, .screen-center{ padding-left:36px; padding-right:36px; }
    }

    /* ---------- SIDE VERSE TICKERS (solo escritorio ancho) ---------- */
    .side-ticker {
      display:none; position:fixed; top:0; bottom:0; overflow:hidden;
      pointer-events:none; z-index:0;
      -webkit-mask-image:linear-gradient(to bottom, transparent, black 12%, black 88%, transparent);
      mask-image:linear-gradient(to bottom, transparent, black 12%, black 88%, transparent);
    }
    .side-ticker-left  { left:0; width:calc(50% - 320px); text-align:right; }
    .side-ticker-right { right:0; width:calc(50% - 320px); text-align:left; }
    .side-ticker-track { position:absolute; top:0; left:0; width:100%; animation:sideScroll 140s linear infinite; }
    .side-ticker-right .side-ticker-track { animation-direction:reverse; }
    .side-ticker-item { padding:20px 22px; font-size:13px; line-height:1.55; color:rgba(201,168,76,0.32); font-style:italic; }
    .side-ticker-item b { display:block; color:rgba(201,168,76,0.5); font-style:normal; font-weight:bold; font-size:12px; letter-spacing:.5px; margin-bottom:3px; }
    @keyframes sideScroll { from{ transform:translateY(0); } to{ transform:translateY(-50%); } }
    @media (min-width:1000px){ .side-ticker{ display:block; } }

    /* ---------- TOP PROGRESS BAR ---------- */
    .topbar {
      position: sticky; top: 0; z-index: 50;
      background: rgba(12,24,36,0.92); backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(201,168,76,0.18);
      padding: 10px 16px;
    }
    .topbar-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color:#7a8ea8; letter-spacing:1px; text-transform:uppercase; margin-bottom:6px; }
    .topbar-row .brand { color:#c9a84c; font-weight:bold; letter-spacing:1.5px; }
    .topbar-row .day { color:#f0ead8; }
    .progress-track { height:3px; background:rgba(255,255,255,0.08); border-radius:2px; overflow:hidden; }
    .progress-fill { height:100%; background:linear-gradient(90deg,#c9a84c,#e8c870); transition:width .5s ease; }

    /* ---------- SCREENS ---------- */
    .screen { min-height: calc(100vh - 60px); padding: 24px 16px 30px; }
    .screen-center {
      min-height: calc(100vh - 60px); display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 32px 24px;
    }

    /* ---------- CARDS ---------- */

    .card-r  { background:rgba(122,142,168,0.14); border:1px solid rgba(122,142,168,0.32); border-radius:14px; padding:16px; margin-bottom:14px; }
    .card-g  { background:rgba(232,212,139,0.13); border:1px solid rgba(232,212,139,0.35); border-radius:14px; padding:16px; margin-bottom:14px; }
    .card-au { background:rgba(201,168,76,0.12); border:1px solid rgba(201,168,76,0.2);  border-radius:14px; padding:20px; text-align:center; margin-bottom:20px; }

    /* ---------- BUTTONS ---------- */
    button { font-family: Georgia, serif; cursor: pointer; }
    .btn-start {
      background:linear-gradient(135deg,#c9a84c,#8c6010); color:#1a0e00;
      border:none; border-radius:50px; padding:16px 48px;
      font-size:17px; font-weight:bold; box-shadow:0 4px 22px rgba(201,168,76,0.4);
    }
    .btn-gold {
      background:linear-gradient(135deg,#c9a84c,#8c6010); color:#1a0e00;
      border:none; border-radius:50px; padding:16px; width:100%;
      font-size:16px; font-weight:bold; display:block; margin-top:4px;
    }
    .btn-gold:disabled { background:rgba(255,255,255,0.08); color:#7a8ea8; cursor:not-allowed; box-shadow:none; }
    .btn-ghost {
      background:rgba(255,255,255,0.06); color:#f0ead8;
      border:1px solid rgba(201,168,76,0.2); border-radius:50px;
      padding:14px; width:100%; font-size:15px; display:block;
    }
    .btn-outline {
      background:transparent; color:#c9a84c;
      border:1px solid rgba(201,168,76,0.4); border-radius:50px;
      padding:12px 18px; font-size:14px; display:inline-block;
    }
    .btn-back { background:none; border:none; color:#7a8ea8; font-size:26px; padding:0; line-height:1; }
    .area-btn {
      background:rgba(255,255,255,0.05); border:1px solid rgba(201,168,76,0.2);
      border-radius:14px; padding:15px 18px; width:100%;
      text-align:left; display:flex; align-items:center; gap:14px;
      margin-bottom:10px; color:#f0ead8;
    }
    .area-btn.done { background:rgba(60,140,60,0.15); border-color:rgba(60,200,60,0.3); cursor:default; }
    .area-btn.locked { opacity:0.5; cursor:not-allowed; }
    .opt {
      background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1);
      border-radius:12px; padding:14px 16px; width:100%;
      text-align:left; color:#7a8ea8; font-size:15px; line-height:1.5;
      display:block; margin-bottom:10px;
    }
    .opt.sel { background:rgba(201,168,76,0.14); border:2px solid rgba(201,168,76,0.55); color:#f0ead8; }
    textarea {
      width:100%; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.15);
      border-radius:10px; padding:12px 14px; color:#f0ead8; font-size:15px;
      font-family:Georgia,serif; line-height:1.6; resize:vertical; min-height:90px; outline:none; display:block;
    }
    textarea::placeholder { color:#7a8ea8; }
    input[type=email] {
      width:100%; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.15);
      border-radius:10px; padding:12px 14px; color:#f0ead8; font-size:15px;
      font-family:Georgia,serif; outline:none; display:block;
    }
    input[type=email]::placeholder { color:#7a8ea8; }

    /* ---------- TYPOGRAPHY ---------- */
    .lbl { font-size:12px; font-weight:bold; letter-spacing:1.2px; text-transform:uppercase; display:block; margin-bottom:8px; }
    .gold { color:#c9a84c; } .muted { color:#7a8ea8; } .cream { color:#f0ead8; }
    .v-ref { color:#c9a84c; font-size:14px; font-weight:bold; margin-bottom:3px; }
    .v-txt { color:#9aa8b8; font-size:14px; font-style:italic; line-height:1.55; margin-bottom:12px; }
    .v-row { display:flex; gap:8px; align-items:flex-start; margin-bottom:14px; }
    .v-text-col { flex:1; }
    .app-line { border-top:1px solid rgba(201,168,76,0.25); padding-top:12px; margin-top:12px; color:#e8d48b; font-size:14px; font-style:italic; }
    .s-card { background:rgba(255,255,255,0.05); border:1px solid rgba(201,168,76,0.2); border-radius:14px; padding:14px 16px; margin-bottom:14px; }
    .s-belief { color:#9aa8b8; font-size:14px; margin-bottom:10px; line-height:1.45; }
    .s-verse  { color:#7a8ea8; font-size:14px; font-style:italic; line-height:1.45; }
    .s-ref-box { background:rgba(255,255,255,0.04); border-left:3px solid rgba(255,255,255,0.15); border-radius:8px; padding:8px 12px; margin-bottom:10px; }
    .s-dec-box { background:rgba(201,168,76,0.12); border-left:3px solid #c9a84c; border-radius:8px; padding:10px 12px; margin-top:10px; }
    .hint { color:#7a8ea8; font-size:13px; margin-top:5px; }
    .center { text-align:center; }
    .info-list { color:#7a8ea8; font-size:14px; line-height:2.1; text-align:left; margin-top:14px; }

    /* ---------- AUDIO PLAYER ---------- */
    .audio-card {
      background:linear-gradient(135deg, rgba(201,168,76,0.10), rgba(201,168,76,0.04));
      border:1px solid rgba(201,168,76,0.3); border-radius:14px;
      padding:18px 16px; margin-bottom:16px;
    }
    .audio-head { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
    .audio-cover {
      width:48px; height:48px; border-radius:10px; flex-shrink:0;
      background:linear-gradient(135deg,#c9a84c,#8c6010);
      display:flex; align-items:center; justify-content:center; font-size:22px;
      box-shadow:0 4px 14px rgba(201,168,76,0.3);
    }
    .audio-meta { flex:1; min-width:0; }
    .audio-title { color:#f0ead8; font-size:14px; font-weight:bold; margin-bottom:2px; }
    .audio-sub { color:#7a8ea8; font-size:13px; }
    .audio-controls { display:flex; align-items:center; gap:12px; }
    .audio-play {
      width:42px; height:42px; border-radius:50%; flex-shrink:0;
      background:linear-gradient(135deg,#c9a84c,#8c6010); border:none; color:#1a0e00;
      font-size:16px; cursor:pointer; box-shadow:0 3px 12px rgba(201,168,76,0.4);
      display:flex; align-items:center; justify-content:center;
    }
    .audio-play:disabled { background:rgba(255,255,255,0.1); color:#7a8ea8; box-shadow:none; cursor:not-allowed; }
    .audio-progress {
      flex:1; height:24px; display:flex; align-items:center; cursor:pointer;
    }
    .audio-bar { flex:1; height:4px; background:rgba(255,255,255,0.1); border-radius:2px; position:relative; overflow:hidden; }
    .audio-bar-fill { position:absolute; left:0; top:0; height:100%; width:0%; background:#c9a84c; border-radius:2px; transition:width .1s linear; }
    .audio-time { color:#7a8ea8; font-size:12px; font-family:monospace; margin-left:8px; min-width:70px; text-align:right; }
    .audio-status { color:#7a8ea8; font-size:12px; margin-top:10px; font-style:italic; }
    .audio-status.live { color:#e8d48b; }

    /* ---------- VERSE AUDIO CHIPS ---------- */
    .verse-chip {
      display:inline-flex; align-items:center; gap:6px;
      background:rgba(201,168,76,0.10); border:1px solid rgba(201,168,76,0.25);
      color:#c9a84c; font-size:12px; padding:4px 10px; border-radius:20px;
      cursor:pointer; margin-left:8px; vertical-align:middle;
    }
    .verse-chip:hover { background:rgba(201,168,76,0.2); }
    .verse-chip.playing { background:#c9a84c; color:#1a0e00; }

    /* ---------- VOICE RECORDER ---------- */
    .recorder {
      background:rgba(255,255,255,0.05); border:1px dashed rgba(201,168,76,0.3);
      border-radius:12px; padding:16px; text-align:center;
    }
    .rec-btn {
      width:64px; height:64px; border-radius:50%; border:none;
      background:radial-gradient(circle at 30% 30%, #d85858, #8c2020);
      color:#fff; font-size:22px; cursor:pointer; margin:0 auto 10px;
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 4px 18px rgba(200,60,60,0.4);
      transition:transform .2s;
    }
    .rec-btn.recording { animation:pulse 1.3s infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.08);} }
    .rec-play-row { display:flex; gap:8px; justify-content:center; margin-top:10px; }
    .rec-play-row button {
      background:rgba(201,168,76,0.15); border:1px solid rgba(201,168,76,0.3);
      color:#c9a84c; padding:8px 14px; border-radius:20px; font-size:13px; cursor:pointer;
    }
    .rec-timer { color:#c9a84c; font-family:monospace; font-size:14px; margin-top:6px; }

    /* ---------- TOAST ---------- */
    #toast {
      position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
      background:rgba(20,32,46,0.96); border:1px solid rgba(201,168,76,0.4);
      color:#f0ead8; padding:12px 20px; border-radius:30px; font-size:14px;
      z-index:200; opacity:0; transition:opacity .3s, bottom .3s; pointer-events:none;
      max-width:90vw; text-align:center;
    }
    #toast.show { opacity:1; bottom:30px; }

    /* ---------- DAY BADGE ---------- */
    .day-badge {
      display:inline-block; background:rgba(201,168,76,0.15);
      border:1px solid rgba(201,168,76,0.3); color:#c9a84c;
      font-size:12px; padding:3px 10px; border-radius:20px; letter-spacing:1px;
      text-transform:uppercase; font-weight:bold; margin-bottom:8px;
    }

    /* ---------- SHARE / EMAIL ---------- */
    .share-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px; }
    .share-btn {
      background:rgba(255,255,255,0.05); border:1px solid rgba(201,168,76,0.2);
      border-radius:12px; padding:14px 10px; color:#f0ead8; font-size:14px;
      cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:6px;
    }
    .share-btn .ic { font-size:22px; }
  </style>
</head>

const AREAS=[
  {id:'tierra',icon:'🌍',title:'Tierra Extranjera',subtitle:'Vivir lejos de casa',
   audio:'https://sonido-de-vida-audio.sonidodevida.workers.dev/reto11/dia-01-tierra-extranjera.mp3', dur:'3:24',
   question:'¿Cuál de estas frases describe más tu sentir en este país?',
   options:['"Estoy solo aquí, sin apoyo real"','"Si me pasa algo malo, no tengo a nadie"','"Me siento desconectado de Dios aquí"','"Todo depende únicamente de mí"'],
   belief:'La creencia de que la distancia física de tu familia equivale a distancia de Dios y falta de protección.',
   truth:'José fue llevado a Egipto contra su voluntad — tierra completamente extranjera. Sin embargo, Génesis 39:2 dice con claridad: "Jehová estaba con José." Eliseo en 2 Reyes 6 oró para que su siervo viera los ejércitos de Dios que los rodeaban — invisibles pero reales. Dios no tiene límites geográficos. Tu dirección postal no determina Su presencia.',
   application:'La pregunta no es ¿dónde estás? sino ¿con quién estás?',appIcon:'📍',
   action:'Esta semana: identifica a una persona en tu misma situación (otro migrante, otro creyente solo) y ofrécele compañía. Dios suele confirmar Su presencia a través de otros.',
   prayer:'Padre, gracias porque tu presencia no tiene fronteras. Donde estoy ahora, Tú estás conmigo. Abre mis ojos para ver los ejércitos que me rodean. Ayúdame a confiar que esta tierra extranjera también es suelo sagrado bajo tu cuidado. En el nombre de Jesús, amén.',
   verses:[
     {ref:'Génesis 39:2',text:'"Jehová estaba con José, y fue varón próspero."'},
     {ref:'Salmos 139:9-10',text:'"Si tomara las alas del alba... aun allí me guiará tu mano."'},

     {ref:'Deuteronomio 31:6',text:'"No temas, es tu Dios quien va contigo; no te dejará ni te desamparará."'},

   ]},
  {id:'familia',icon:'🤝',title:'Familia Separada',subtitle:'Los que están lejos',
   audio:'https://sonido-de-vida-audio.sonidodevida.workers.dev/reto11/dia-02-familia-separada.mp3', dur:'3:41',
   question:'¿Qué pensamiento aparece cuando piensas en tu familia lejos?',
   options:['"No puedo protegerlos desde aquí"','"Salir fue un error que los perjudicó"','"Nunca podré ayudarlos de verdad"','"Dios los olvidó porque están allá"'],
   belief:'La creencia de que la separación de tu familia es un fracaso tuyo o un abandono de Dios hacia ellos.',
   truth:'José fue vendido y separado de su familia más de veinte años. Al reencontrarse dijo: "No fuisteis vosotros los que me enviasteis acá, sino Dios" (Génesis 45:8). También Noemí — perdió todo en tierra extranjera, pero Dios usó ese proceso para traer a Rut, bisabuela del rey David. Lo que parece ruptura, Dios lo convierte en puente de provisión.',

   verses:[
     {ref:'Génesis 45:7-8',text:'"Dios me envió delante de vosotros para preservaros."'},
     {ref:'Romanos 8:28',text:'"Todas las cosas ayudan a bien a los que aman a Dios."'},
     {ref:'Salmo 68:6',text:'"Dios hace habitar en familia a los desamparados."'},
     {ref:'Isaías 49:15-16',text:'"En las palmas de las manos te tengo esculpida."'},
     {ref:'Jeremías 32:27',text:'"He aquí que yo soy el Señor. ¿Habrá algo que sea difícil para mí?"'}
   ]},
  {id:'finanzas',icon:'💸',title:'Finanzas y Deudas',subtitle:'La carga económica',

   truth:'En 2 Reyes 4, una viuda estaba a punto de perder a sus hijos por deuda. Eliseo multiplicó su aceite y le dijo: "Ve, vende el aceite y paga a tus acreedores." Dios no solo perdonó la deuda — proveyó el recurso. En Lucas 7:41-43, un acreedor perdonó deudas impagables por pura gracia. Tu deuda tiene un número específico. El poder de Dios no tiene límite.',

   belief:'La creencia de que el futuro es una amenaza que necesitas controlar o de la que debes protegerte.',

/* ============================================================
   STATE + PERSISTENCE
   ============================================================ */
const STORAGE_KEY = 'sdv_11dias_v2';

function defaultState(){
  return {screen:'welcome',areaIdx:null,option:null,done:[],results:[],notes:{},email:'',startedDate:null,currentDay:1};
}
let S = loadState();

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return defaultState();
    const parsed = JSON.parse(raw);
    return Object.assign(defaultState(), parsed);
  }catch(e){ return defaultState(); }
}
function saveState(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(S)); }catch(e){}
}

function note(id,f,v){
  if(v!==undefined){
    if(!S.notes[id]) S.notes[id]={};
    S.notes[id][f]=v;
    saveState();
  }
  return (S.notes[id]||{})[f]||'';
}

function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._tm);
  t._tm = setTimeout(()=>t.classList.remove('show'), 2600);
}

/* ============================================================
   AUDIO PLAYER (degrades gracefully when file is missing)
   ============================================================ */
const audioCache = {};
let currentAudio = null;

function makeAudioPlayer(src, title, subtitle){
  const id = 'ap_' + Math.random().toString(36).slice(2,9);
  setTimeout(()=>{
    const el = document.getElementById(id);
    if(!el) return;
    const playBtn = el.querySelector('.audio-play');
    const bar = el.querySelector('.audio-bar-fill');
    const timeEl = el.querySelector('.audio-time');
    const statusEl = el.querySelector('.audio-status');

    let audio = audioCache[src];
    if(!audio){
      audio = new Audio();
      audio.preload = 'none';
      audio.src = src;
      audioCache[src] = audio;
    }

    // Probe if file exists
    audio.addEventListener('error', ()=>{
      playBtn.disabled = true;
      statusEl.textContent = '🎧 Audio en preparación — disponible pronto';
      statusEl.classList.remove('live');
    });
    audio.addEventListener('loadedmetadata', ()=>{
      statusEl.textContent = '🎧 Disponible · ' + (audio.duration?formatTime(audio.duration):'');
      statusEl.classList.add('live');
    });

    playBtn.addEventListener('click', ()=>{
      if(audio.paused){
        // stop any other playing audio
        if(currentAudio && currentAudio !== audio){ currentAudio.pause(); }
        currentAudio = audio;
        audio.play().catch(()=>{});
      } else {
        audio.pause();
      }
    });

    audio.addEventListener('play', ()=>{ playBtn.textContent = '⏸'; });
    audio.addEventListener('pause', ()=>{ playBtn.textContent = '▶'; });
    audio.addEventListener('ended', ()=>{ playBtn.textContent = '▶'; bar.style.width='0%'; timeEl.textContent='0:00'; });
    audio.addEventListener('timeupdate', ()=>{
      if(!audio.duration) return;
      const pct = (audio.currentTime/audio.duration)*100;
      bar.style.width = pct+'%';
      timeEl.textContent = formatTime(audio.currentTime) + ' / ' + formatTime(audio.duration);
    });

    // seek
    const track = el.querySelector('.audio-progress');
    track.addEventListener('click', (e)=>{
      if(!audio.duration) return;
      const rect = track.getBoundingClientRect();
      const ratio = (e.clientX-rect.left)/rect.width;
      audio.currentTime = audio.duration*ratio;
    });
  }, 30);

  return `<div class="audio-card" id="${id}">
    <div class="audio-head">
      <div class="audio-cover">🎧</div>
      <div class="audio-meta">
        <div class="audio-title">${esc(title)}</div>
        <div class="audio-sub">${esc(subtitle)}</div>
      </div>
    </div>
    <div class="audio-controls">
      <button class="audio-play">▶</button>
      <div class="audio-progress"><div class="audio-bar"><div class="audio-bar-fill"></div></div></div>
      <div class="audio-time">0:00</div>
    </div>
    <div class="audio-status">Cargando…</div>
  </div>`;
}

function formatTime(sec){
  if(!sec || isNaN(sec)) return '0:00';
  const m = Math.floor(sec/60);
  const s = Math.floor(sec%60);
  return m+':'+(s<10?'0':'')+s;
}

/* ============================================================
   VOICE RECORDER
   ============================================================ */
let mediaRecorder = null;
let recChunks = [];
let recTimer = null;
let recStart = 0;

function makeRecorder(areaId){
  const id = 'rec_' + areaId;
  setTimeout(()=>{
    const el = document.getElementById(id);
    if(!el) return;
    const btn = el.querySelector('.rec-btn');
    const timerEl = el.querySelector('.rec-timer');
    const playRow = el.querySelector('.rec-play-row');

    // Load existing recording if any
    const existing = localStorage.getItem('sdv_rec_'+areaId);
    if(existing){
      showRecPlayback(playRow, existing, areaId);
    }

    btn.addEventListener('click', async ()=>{
      if(mediaRecorder && mediaRecorder.state === 'recording'){
        mediaRecorder.stop();
        return;
      }
      try{
        const stream = await navigator.mediaDevices.getUserMedia({audio:true});
        recChunks = [];
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = e=>{ if(e.data.size>0) recChunks.push(e.data); };
        mediaRecorder.onstop = ()=>{
          const blob = new Blob(recChunks, {type:'https://sonido-de-vida-audio.sonidodevida.workers.dev/reto11/webm'});
          const reader = new FileReader();
          reader.onload = ()=>{
            const dataUrl = reader.result;
            try{ localStorage.setItem('sdv_rec_'+areaId, dataUrl); }catch(e){ toast('Grabación demasiado larga para guardar localmente'); }
            showRecPlayback(playRow, dataUrl, areaId);
          };
          reader.readAsDataURL(blob);
          stream.getTracks().forEach(t=>t.stop());
          btn.textContent = '🎤';
          btn.classList.remove('recording');
          clearInterval(recTimer);
          timerEl.textContent = '✓ Grabación guardada';
          toast('Declaración grabada ✓');
        };
        mediaRecorder.start();
        btn.textContent = '⏹';
        btn.classList.add('recording');
        recStart = Date.now();
        timerEl.textContent = '0:00';
        recTimer = setInterval(()=>{
          const sec = Math.floor((Date.now()-recStart)/1000);
          timerEl.textContent = formatTime(sec);
        }, 1000);
      }catch(e){
        toast('No se pudo acceder al micrófono');
      }
    });
  }, 30);

  return `<div class="recorder" id="${id}">
    <button class="rec-btn" title="Grabar mi declaración">🎤</button>
    <div class="rec-timer muted" style="font-size:13px">Toca para grabar tu declaración en tu propia voz</div>
    <div class="rec-play-row"></div>

function pdfClean(s){
  // Las fuentes estándar de jsPDF (Times/Helvetica) no soportan emoji: al
  // pasarlos a doc.text() se dibujan como bytes corruptos ("Ø<ß"). Se
  // eliminan aquí antes de escribir en el PDF.
  return String(s==null?'':s)
    .replace(/[\u{1F000}-\u{1FFFF}\u{2600}-\u{27BF}\u{2190}-\u{21FF}\u{2B00}-\u{2BFF}️‍]/gu,'')
    .replace(/\s+/g,' ').trim();
}

function wrapText(doc, text, x, y, maxW, lineH){
  const words = String(text).split(/\s+/);
  let line = '';
  for(const w of words){
    const test = line ? line+' '+w : w;
    if(doc.getTextWidth(test) > maxW){
      doc.text(line, x, y);
      y += lineH;
      line = w;
    } else {
      line = test;
    }
  }
  if(line){ doc.text(line, x, y); y += lineH; }
  return y;
}

      break;
    case 'resume':
      S.screen='areas';
      render();
      break;
    case 'area':{
      const idx = parseInt(el.dataset.idx);
      if(S.done.includes(AREAS[idx].id)) break;
      S.areaIdx = idx;
      const savedOptIdx = note(AREAS[idx].id,'optIdx');
      S.option = savedOptIdx ? AREAS[idx].options[savedOptIdx-1] : null;
      S.screen = 'question';
      render();
      break;
    }
    case 'opt':{
      saveTAs();
      const i = parseInt(el.dataset.i);
      S.option = AREAS[S.areaIdx].options[i];
      note(AREAS[S.areaIdx].id,'optIdx', i+1);
      render();
      break;
    }
    case 'reveal':
      if(!S.option) break;
      saveTAs();
      S.screen='result';
      render();
      break;
    case 'next':{
      saveTAs();
      const ar = AREAS[S.areaIdx];
      if(!S.done.includes(ar.id)){
        S.done = [...S.done, ar.id];
      }
      // update or add result
      const existingIdx = S.results.findIndex(r=>r.area.id===ar.id);
      const hasVoice = !!localStorage.getItem('sdv_rec_'+ar.id);
      const newResult = {
        area: ar,
        answer: S.option,
        ref: note(ar.id,'r'),
        dec: note(ar.id,'d'),
        hasVoice: hasVoice
      };
      if(existingIdx>=0) S.results[existingIdx] = newResult;
      else S.results = [...S.results, newResult];
      S.screen = S.done.length>=AREAS.length ? 'summary' : 'areas';
      saveState();
      render();
      toast('Área guardada ✓');
      break;
    }
    case 'back':
      saveTAs();
      S.screen='areas';
      render();
      break;
    case 'summary':
      S.screen='summary';
      render();
      break;
    case 'toAreas':
      S.screen='areas';
      render();
      break;
    case 'pdf':
      exportPDF();
      break;
    case 'email':{
      const inp = document.getElementById('emailInp');
      const btn = document.querySelector('[data-a="email"]');
      const v = (inp.value||'').trim();
      if(!v || !/^[^@]+@[^@]+\.[^@]+$/.test(v)){ toast('Ingresa un correo válido'); return; }
      S.email = v;
      saveState();
      if(btn){ btn.disabled = true; btn.textContent = 'Enviando...'; }
      fetch('https://sonido-de-vida-api.sonidodevida.workers.dev/api/reto11/subscribe', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({email: v})
      }).then(r => { if(!r.ok) throw new Error(); toast('¡Inscrito! Recibirás un versículo diario por 11 días 🎉'); })
        .catch(() => toast('No se pudo inscribir, intenta de nuevo'))
        .finally(() => { if(btn){ btn.disabled = false; btn.textContent = '✉ Suscribirme'; } });
      break;
    }
    case 'share-wa':{
      const txt = 'Estoy renovando mi mente con la Palabra en 11 días. Únete al reto aquí: '+location.href+' 🙌';
      window.open('https://wa.me/?text='+encodeURIComponent(txt), '_blank');
      break;
    }
    case 'share-link':{
      const url = location.href;
      navigator.clipboard?.writeText(url).then(()=>toast('Enlace copiado ✓')).catch(()=>toast('Copia manualmente: '+url));
      break;
    }
    case 'restart':
      if(confirm('¿Reiniciar todo el recorrido? Se perderá tu progreso, notas y grabaciones.')){
        // clear all rec data
        AREAS.forEach(ar=>localStorage.removeItem('sdv_rec_'+ar.id));
        localStorage.removeItem(STORAGE_KEY);
        S = defaultState();
        render();
      }
      break;
  }

  // Verse chip click
  if(el.dataset.verse !== undefined && el.classList.contains('verse-chip')){
    const idx = parseInt(el.dataset.verse);
    const ar = AREAS[S.areaIdx];
    const v = ar.verses[idx];
    const src = 'https://sonido-de-vida-audio.sonidodevida.workers.dev/reto11/verso-'+ar.id+'-'+(idx+1)+'.mp3';
    if(currentAudio){ currentAudio.pause(); }
    document.querySelectorAll('.verse-chip.playing').forEach(c=>c.classList.remove('playing'));
    let audio = audioCache[src];
    if(!audio){
      audio = new Audio();
      audio.preload = 'none';
      audio.src = src;
      audioCache[src] = audio;
    }
    audio.addEventListener('play', ()=>el.classList.add('playing'));
    audio.addEventListener('pause', ()=>el.classList.remove('playing'));
    audio.addEventListener('ended', ()=>el.classList.remove('playing'));
    audio.addEventListener('error', ()=>toast('Audio del versículo en preparación'));
    currentAudio = audio;
    audio.play().catch(()=>toast('Audio en preparación'));
  }
});

document.addEventListener('input', function(e){
  if(S.areaIdx===null) return;
  const ar = AREAS[S.areaIdx];
  if(e.target.id==='rta') note(ar.id,'r',e.target.value);
  if(e.target.id==='dta') note(ar.id,'d',e.target.value);
});

window.addEventListener('beforeunload', saveState);

/* ============================================================
   SIDE VERSE TICKERS — decoración tipo "créditos" en el espacio
   vacío lateral de pantallas anchas. Puramente visual (aria-hidden).
   ============================================================ */
function buildSideTickers(){
  const allVerses = AREAS.flatMap(a=>a.verses);
  const itemsHtml = list => list.concat(list).map(v =>
    `<div class="side-ticker-item"><b>${esc(v.ref)}</b>${esc(v.text)}</div>`
  ).join('');
  const holder = document.createElement('div');
  holder.innerHTML =
    `<div class="side-ticker side-ticker-left" aria-hidden="true"><div class="side-ticker-track">${itemsHtml(allVerses)}</div></div>` +
    `<div class="side-ticker side-ticker-right" aria-hidden="true"><div class="side-ticker-track">${itemsHtml(allVerses.slice().reverse())}</div></div>`;
  while(holder.firstChild) document.body.appendChild(holder.firstChild);
}
buildSideTickers();

render();
</script>
