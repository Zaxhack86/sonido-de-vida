<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonido de Vida</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0d0d1a; color: white; }
        .hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
        h1 { font-size: 2.5rem; margin-bottom: 1rem; }
        h1 span { color: #c9a84c; }
        .btn { background: #c9a84c; color: #0d0d1a; padding: 1rem 2rem; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; margin: 0.5rem; }
        .search-box { max-width: 600px; margin: 3rem auto; padding: 2rem; background: #1a1a3e; border-radius: 15px; }
        select { width: 100%; padding: 0.8rem; margin: 0.5rem 0; border-radius: 8px; border: 1px solid #c9a84c; background: #0d0d1a; color: white; }
        select option { background: #0d0d1a; color: #c9a84c; }
        .result { margin-top: 2rem; padding: 1.5rem; background: rgba(201,168,76,0.1); border-radius: 10px; display: none; }
        .result.show { display: block; }
        .verse-text { font-size: 1.2rem; line-height: 1.6; font-style: italic; margin: 1rem 0; }
        .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem; }
        .action-btn { background: rgba(201,168,76,0.2); color: #c9a84c; border: 1px solid #c9a84c; padding: 0.6rem 1.2rem; border-radius: 8px; cursor: pointer; }
        .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: #1a1a3e; padding: 1rem 2rem; border-radius: 10px; display: none; }
        .toast.show { display: block; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>ESCUCHA LA <span>PALABRA</span> DE DIOS</h1>
        <p>Lee, escucha y descarga versículos en español. 100% gratis.</p>
        <div>
            <button class="btn" onclick="document.getElementById('search').scrollIntoView({behavior:'smooth'})">🔍 Buscar Versículo</button>
            <button class="btn" onclick="randomVerse()" style="background:transparent; border:1px solid #c9a84c; color:#c9a84c">🎲 Aleatorio</button>
        </div>
    </div>

    <div class="search-box" id="search">
        <h2 style="margin-bottom:1.5rem; color:#c9a84c">BUSCAR UN VERSÍCULO</h2>
        <label>Libro</label>
        <select id="book" onchange="loadChapters()"><option value="">Selecciona...</option></select>
        
        <label>Capítulo</label>
        <select id="chapter" onchange="loadVerses()" disabled><option value="">Primero elige libro</option></select>
        
        <label>Versículo</label>
        <select id="verse" disabled><option value="">Primero elige capítulo</option></select>
        
        <button class="btn" onclick="search()" style="width:100%; margin-top:1rem">🔍 Buscar</button>
        
        <div class="result" id="result">
            <h3 id="ref" style="color:#c9a84c"></h3>
            <p class="verse-text" id="text"></p>
            <div class="actions">
                <button class="action-btn" onclick="speak()">🔊 Escuchar</button>
                <button class="action-btn" onclick="download()">💾 Descargar MP3</button>
                <button class="action-btn" onclick="copy()">📋 Copiar</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // Libros de la Biblia
        const books = [
            {name:"Génesis", abbr:"Genesis", chapters:50}, {name:"Éxodo", abbr:"Exodus", chapters:40},
            {name:"Salmos", abbr:"Psalms", chapters:150}, {name:"Mateo", abbr:"Matthew", chapters:28},
            {name:"Marcos", abbr:"Mark", chapters:16}, {name:"Lucas", abbr:"Luke", chapters:24},
            {name:"Juan", abbr:"John", chapters:21}, {name:"Romanos", abbr:"Romans", chapters:16}
        ];

        let currentVerse = {ref:'', text:''};

        // Cargar libros al inicio
        window.onload = function() {
            const sel = document.getElementById('book');
            books.forEach(b => {
                const opt = document.createElement('option');
                opt.value = b.abbr;
                opt.textContent = b.name;
                opt.dataset.chapters = b.chapters;
                sel.appendChild(opt);
            });
        };

        function loadChapters() {
            const book = document.getElementById('book');
            const chap = document.getElementById('chapter');
            const vers = document.getElementById('verse');
            
            if(!book.value) {
                chap.disabled = true;
                vers.disabled = true;
                return;
            }
            
            const maxChapters = parseInt(book.options[book.selectedIndex].dataset.chapters);
            chap.innerHTML = '<option value="">Selecciona capítulo</option>';
            for(let i=1; i<=maxChapters; i++) {
                const opt = document.createElement('option');
                opt.value = i;
                opt.textContent = i;
                chap.appendChild(opt);
            }
            chap.disabled = false;
            vers.disabled = true;
            vers.innerHTML = '<option value="">Primero elige capítulo</option>';
        }

        function loadVerses() {
            const chap = document.getElementById('chapter');
            const vers = document.getElementById('verse');
            
            if(!chap.value) {
                vers.disabled = true;
                return;
            }
            
            // Versículos estimados (máximo 176 para Salmo 119)
            vers.innerHTML = '<option value="">Selecciona versículo</option>';
            for(let i=1; i<=50; i++) {
                const opt = document.createElement('option');
                opt.value = i;
                opt.textContent = i;
                vers.appendChild(opt);
            }
            vers.disabled = false;
        }

        async function search() {
            const book = document.getElementById('book').value;
            const chapter = document.getElementById('chapter').value;
            const verse = document.getElementById('verse').value;
            
            if(!book || !chapter) {
                showToast('Selecciona libro y capítulo');
                return;
            }
            
            showToast('Buscando...');
            
            try {
                const ref = verse ? `${book}+${chapter}:${verse}` : `${book}+${chapter}`;
                const response = await fetch(`https://bible-api.com/${ref}?translation=rvr1960`);
                const data = await response.json();
                
                if(data.text) {
                    currentVerse = {
                        ref: data.reference || `${book} ${chapter}${verse ? ':'+verse : ''}`,
                        text: data.text.trim()
                    };
                    
                    document.getElementById('ref').textContent = currentVerse.ref;
                    document.getElementById('text').textContent = currentVerse.text;
                    document.getElementById('result').classList.add('show');
                    showToast('¡Versículo encontrado!');
                } else {
                    showToast('No se encontró. Intenta Juan 3:16');
                }
            } catch(err) {
                showToast('Error de conexión');
                console.error(err);
            }
        }

        async function randomVerse() {
            showToast('Buscando versículo aleatorio...');
            try {
                const response = await fetch('https://bible-api.com/random?translation=rvr1960');
                const data = await response.json();
                
                if(data.text) {
                    currentVerse = {
                        ref: data.reference,
                        text: data.text.trim()
                    };
                    
                    document.getElementById('ref').textContent = currentVerse.ref;
                    document.getElementById('text').textContent = currentVerse.text;
                    document.getElementById('result').classList.add('show');
                    document.getElementById('result').scrollIntoView({behavior:'smooth'});
                    showToast('¡Versículo aleatorio cargado!');
                }
            } catch(err) {
                showToast('Error al cargar');
            }
        }

        function speak() {
            if(!currentVerse.text) return showToast('Busca un versículo primero');
            
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(currentVerse.text);
            utterance.lang = 'es-ES';
            utterance.rate = 0.7;
            
            const voices = speechSynthesis.getVoices();
            const spanishVoice = voices.find(v => v.lang.startsWith('es'));
            if(spanishVoice) utterance.voice = spanishVoice;
            
            speechSynthesis.speak(utterance);
            showToast('Reproduciendo...');
        }

        function download() {
            if(!currentVerse.text) return showToast('Busca un versículo primero');
            
            const text = encodeURIComponent(currentVerse.text);
            const url = `https://translate.google.com/translate_tts?ie=UTF-8&tl=es&client=tw-ob&q=${text}`;
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `${currentVerse.ref.replace(/[: ]/g, '_')}.mp3`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            showToast('Descargando MP3...');
        }

        async function copy() {
            if(!currentVerse.text) return showToast('Busca un versículo primero');
            
            await navigator.clipboard.writeText(`${currentVerse.ref}\n\n"${currentVerse.text}"`);
            showToast('¡Copiado al portapapeles!');
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
