<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonido de Vida - Biblia en Audio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .serif { font-family: 'Playfair Display', serif; }
        .bg-biblia { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); }
    </style>
</head>
<body class="bg-biblia min-height-screen flex flex-col items-center p-6">

    <audio id="bgMusic" loop>
        <source src="https://www.bensound.com/bensound-music/bensound-slowmotion.mp3" type="audio/mpeg">
    </audio>

    <header class="text-center mb-10">
        <h1 class="serif text-4xl font-bold text-slate-800">Sonido de Vida</h1>
        <p class="text-slate-600 mt-2">Encuentra paz en su palabra</p>
    </header>

    <main class="w-full max-w-2xl bg-white rounded-3xl shadow-xl p-8">
        <div class="flex gap-2 mb-8">
            <input type="text" id="searchInput" placeholder="Ej: Juan 3:16" 
                   class="flex-1 border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-400">
            <button onclick="searchVerse()" class="bg-slate-800 text-white px-6 py-3 rounded-xl hover:bg-slate-700 transition">Buscar</button>
        </div>

        <div id="displayArea" class="text-center min-h-[200px] flex flex-col justify-center border-y border-slate-100 py-6">
            <h2 id="refDisplay" class="text-blue-600 font-semibold mb-2">Presiona "Random" o busca un versículo</h2>
            <p id="verseDisplay" class="serif text-2xl italic text-slate-700 leading-relaxed italic">"..."</p>
        </div>

        <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mt-8">
            <button onclick="playRandom()" class="flex flex-col items-center p-4 bg-blue-50 rounded-2xl hover:bg-blue-100 transition">
                <span class="text-2xl mb-1">🎲</span>
                <span class="text-xs font-bold text-blue-800">RANDOM</span>
            </button>
            <button onclick="speakVerse()" class="flex flex-col items-center p-4 bg-green-50 rounded-2xl hover:bg-green-100 transition">
                <span class="text-2xl mb-1">🔊</span>
                <span class="text-xs font-bold text-green-800">ESCUCHAR</span>
            </button>
            <button onclick="downloadAudio()" class="flex flex-col items-center p-4 bg-purple-50 rounded-2xl hover:bg-purple-100 transition">
                <span class="text-2xl mb-1">💾</span>
                <span class="text-xs font-bold text-purple-800">MP3</span>
            </button>
            <button id="musicToggle" onclick="toggleMusic()" class="flex flex-col items-center p-4 bg-orange-50 rounded-2xl hover:bg-orange-100 transition">
                <span id="musicIcon" class="text-2xl mb-1">🔇</span>
                <span class="text-xs font-bold text-orange-800 text-center uppercase">Música</span>
            </button>
        </div>
    </main>

    <footer class="mt-10 text-slate-500 text-sm">
        &copy; 2026 Sonido de Vida · Hecho con fe
    </footer>

    <script>
        let currentVerse = { ref: "", text: "" };
        const bgMusic = document.getElementById('bgMusic');
        bgMusic.volume = 0.2; // Música bajita

        async function searchVerse() {
            const ref = document.getElementById('searchInput').value;
            if (!ref) return;
            fetchVerse(`https://bible-api.com/${ref}?translation=rvr09`);
        }

        async function playRandom() {
            // Nota: Esta API no tiene /random nativo que funcione bien siempre,
            // usamos un versículo conocido al azar para el ejemplo
            const randomRefs = ["Juan 3:16", "Salmos 23:1", "Filipenses 4:13", "Mateo 11:28", "Proverbios 3:5"];
            const selection = randomRefs[Math.floor(Math.random() * randomRefs.length)];
            fetchVerse(`https://bible-api.com/${selection}?translation=rvr09`);
        }

        async function fetchVerse(url) {
            try {
                const res = await fetch(url);
                const data = await res.json();
                if (data.text) {
                    currentVerse = { ref: data.reference, text: data.text };
                    document.getElementById('verseDisplay').innerText = `"${data.text.trim()}"`;
                    document.getElementById('refDisplay').innerText = data.reference;
                }
            } catch (e) { alert("No se encontró el versículo"); }
        }

        function speakVerse() {
            if (!currentVerse.text) return;
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance(currentVerse.text);
            utter.lang = 'es-ES';
            utter.rate = 0.9;
            synth.speak(utter);
        }

        function downloadAudio() {
            if (!currentVerse.text) return alert("Busca un versículo primero");
            const text = encodeURIComponent(currentVerse.text);
            // Proxy de Google TTS para generar el archivo
            const audioUrl = `https://translate.google.com/translate_tts?ie=UTF-8&tl=es-US&client=tw-ob&q=${text}`;
            window.open(audioUrl, '_blank'); 
        }

        function toggleMusic() {
            if (bgMusic.paused) {
                bgMusic.play();
                document.getElementById('musicIcon').innerText = "🎵";
            } else {
                bgMusic.pause();
                document.getElementById('musicIcon').innerText = "🔇";
            }
        }
    </script>
</body>
</html>
