name = "sonido-de-vida-api"
main = "api-worker.js"
compatibility_date = "2024-10-01"

[vars]
# Tu projectId de Firebase (Project Settings → General). NO es secreto.
FIREBASE_PROJECT_ID = "sonidodevida-7ebe7"
# Origen del frontend en producción.
ALLOWED_ORIGIN = "https://sonidodevida.com"
# UIDs con acceso total (admin = premium permanente). Separados por coma.
# Pega aquí tu UID tras entrar una vez (Firebase → Authentication → Usuarios).
ADMIN_UIDS = "h1u8iq53w8T7oBcVfN1167zEsC22"
# Remitente de los correos de login (debe ser de un dominio autenticado en Brevo).
SENDER_EMAIL = "noreply@sonidodevida.com"

# ── Stripe (suscripciones premium) ───────────────────────────────────
# Los price IDs se crean en el dashboard de Stripe (Productos → añadir precio).
# Plan acordado: $2.99/mes y $24.99/año, con 7 días de prueba gratis.
# REEMPLAZA estos placeholders por tus price_... reales antes de desplegar.
STRIPE_PRICE_MONTHLY = "price_1TjQaIAdTR9UfqK3UB6Ie1g1"
STRIPE_PRICE_ANNUAL  = "price_1TjQbpAdTR9UfqK3U0tH0PI7"
STRIPE_TRIAL_DAYS    = "7"

# SECRETOS (NO van aquí, se ponen en el dashboard de Cloudflare como cifrados):
#   BREVO_API_KEY           -> la API key de Brevo (SMTP & API → API Keys)
#   FIREBASE_SERVICE_ACCOUNT-> el contenido COMPLETO del .json de la cuenta de
#                              servicio de Firebase (pegado tal cual, todo el JSON)
#   STRIPE_SECRET_KEY        -> sk_live_... (o sk_test_... para pruebas)
#   STRIPE_WEBHOOK_SECRET    -> whsec_... (del endpoint /api/stripe/webhook en Stripe)

# D1: crear con  ->  npx wrangler d1 create sonido-de-vida-db
# luego pega aquí el database_id que imprime el comando.
[[d1_databases]]
binding = "DB"
database_name = "sonido-de-vida-db"
database_id = "69d3734a-91bc-4001-a2fb-bcfe99f7e890"

# KV: crear con  ->  npx wrangler kv namespace create PREMIUM
# luego pega aquí el id que imprime el comando.
[[kv_namespaces]]
binding = "PREMIUM"
id = "3dabdded16a542b7948b1ab0cb7d0018"

# R2 (portero premium): descomenta y pon el nombre de tu bucket PRIVADO para
# activar GET /api/content/:id. Sin esto, el portero responde 503 (inerte).
# Crea uno aparte del de audio público, ej:  npx wrangler r2 bucket create sdv-premium
[[r2_buckets]]
binding = "CONTENT"
bucket_name = "sdv-premium"
